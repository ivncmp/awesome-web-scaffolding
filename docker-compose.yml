services:
  awesome-scaffolding:
    build: .
    container_name: awesome-scaffolding
    restart: unless-stopped
    ports:
      - "5173:3000"
    volumes:
      - ./frontend:/app/frontend
      - ./backend:/app/backend
      - /app/node_modules
    environment:
      - NODE_ENV=development
      - VITE_SUPABASE_URL=http://192.168.1.80:8000
      - VITE_SUPABASE_ANON_KEY=demo-key
    networks:
      - awesome-net
    depends_on:
      - edge-functions

  # Edge Functions - serves all functions via simple router
  edge-functions:
    image: denoland/deno:alpine-2.1.8
    container_name: awesome-edge-functions
    restart: unless-stopped
    working_dir: /app
    command: deno run --allow-net --allow-env --allow-read --allow-import server.ts
    ports:
      - "8000:8000"
    volumes:
      - ./backend/supabase/functions:/app
    networks:
      - awesome-net
    environment:
      - DENO_DIR=/deno-dir

networks:
  awesome-net:
    driver: bridge
